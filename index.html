<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapdrop 💧 | Reply Guys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="6d46ab6c-1475-4475-8c4b-d8a9c3b5e7a9"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C16.4183 22 20 18.4183 20 14C20 8 12 2 12 2C12 2 4 8 4 14C4 18.4183 7.58172 22 12 22Z" fill="#0D4D44"/>
                </svg>
                <span>Yapdrop</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <section class="tool-section">
            <h1 class="title">Reply Guys</h1>
            <p class="subtitle">You can generate up to 50 replies at a go</p>

            <div class="controls">
                <div class="counter-label">Number of Tweets *</div>
                <div class="counter">
                    <button id="decrement" class="counter-btn" aria-label="Decrease counter">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14"/>
                        </svg>
                    </button>
                    <span id="tweet-count">1</span>
                    <button id="increment" class="counter-btn" aria-label="Increase counter">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="auto-label">auto</div>

            <div id="tweet-inputs" class="tweet-inputs">
                <!-- Inputs will be dynamically generated here -->
                <div class="input-group">
                    <div class="input-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <input type="text" placeholder="Tweet link 1..." class="tweet-input">
                </div>
            </div>

            <button id="generate-btn" class="primary-btn">Generate Reply</button>
        </section>

        <!-- Table Section -->
        <section class="table-section">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Tweet Links</th>
                            <th>Replies</th>
                            <th>Post</th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <tr>
                            <td>...</td>
                            <td>...</td>
                            <td>...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
